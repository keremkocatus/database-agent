# M0-M2 geliştirme ortamı (design/19): Postgres(pgvector+pg_trgm) + seed/demo MSSQL.
# api/worker servisleri M6/M7'de eklenir; şimdilik CLI inline çalışır.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dbagent
      POSTGRES_PASSWORD: dbagent
      POSTGRES_DB: dbagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Sa_Strong_Pass_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - ./seed/mssql:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Seed: mssql sağlıklı olunca demo şemayı + read-only servis hesabını kurar, sonra çıkar.
  mssql-seed:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "Sa_Strong_Pass_2026!"
    volumes:
      - ./seed/mssql:/seed:ro
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -i /seed/01_schema.sql &&
      echo 'seed tamam'"
    restart: "no"

volumes:
  pgdata:
